<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة المنتجات</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام إدارة المنتجات 📦</h1>
    <input type="text" id="name" placeholder="اسم المنتج">
    <input type="number" id="price" placeholder="السعر">
    <input type="number" id="qty" placeholder="الكمية">
    <button id="saveBtn">حفظ المنتج</button>

    <table>
        <thead>
            <tr>
                <th>اسم المنتج</th>
                <th>السعر</th>
                <th>الكمية</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0R3gRqDdPnvthG0vv7eqz5qQmhx853mg",
        authDomain: "tcountapp.firebaseapp.com",
        databaseURL: "https://tcountapp-default-rtdb.firebaseio.com",
        projectId: "tcountapp",
        storageBucket: "tcountapp.firebasestorage.app",
        messagingSenderId: "612173455321",
        appId: "1:612173455321:web:5414126ac4aa40a131c3c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const productsRef = ref(db, 'products');

    document.getElementById('saveBtn').onclick = () => {
        push(productsRef, {
            name: document.getElementById('name').value,
            price: document.getElementById('price').value,
            qty: document.getElementById('qty').value
        });
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('qty').value = '';
    };

    onValue(productsRef, (snapshot) => {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ''; 
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            tableBody.innerHTML += `<tr>
                <td>${data.name}</td>
                <td>${data.price}</td>
                <td>${data.qty}</td>
            </tr>`;
        });
    });
</script>

</body>
</html>
