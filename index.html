<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - TCountApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4 text-primary">📦 نظام إدارة المنتجات (TCountApp)</h2>

    <!-- نموذج إضافة/تعديل منتج -->
    <div class="card p-4 mb-4">
        <h5 id="formTitle" class="card-title text-secondary mb-3">إضافة منتج جديد</h5>
        <form id="productForm">
            <input type="hidden" id="productId">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">اسم المنتج</label>
                    <input type="text" id="proName" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">السعر</label>
                    <input type="number" id="proPrice" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">الكمية</label>
                    <input type="number" id="proQty" class="form-control" required>
                </div>
            </div>
            <div class="mt-3 text-start">
                <button type="submit" id="saveBtn" class="btn btn-success px-4">حفظ المنتج</button>
                <button type="button" id="cancelBtn" class="btn btn-secondary d-none" onclick="resetForm()">إلغاء</button>
            </div>
        </form>
    </div>

    <!-- جدول عرض المنتجات -->
    <div class="card p-4">
        <h5 class="card-title text-secondary mb-3">قائمة المنتجات الحالية</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>المعرف (ID)</th>
                        <th>اسم المنتج</th>
                        <th>السعر</th>
                        <th>الكمية</th>
                        <th>العمليات</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <!-- سيتم توليد الصفوف برمجياً -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('products')) || [];
    const form = document.getElementById('productForm');
    
    function saveToStorage() {
        localStorage.setItem('products', JSON.stringify(products));
        renderProducts();
    }

    function renderProducts() {
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = '';
        
        if(products.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">لا توجد منتجات مسجلة حالياً.</td></tr>`;
            return;
        }

        products.forEach((prod, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${prod.name}</strong></td>
                    <td>${prod.price} ج.م</td>
                    <td><span class="badge bg-info text-dark">${prod.qty}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editProduct(${prod.id})">تعديل</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${prod.id})">حذف</button>
                    </td>
                </tr>
            `;
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('productId').value;
        const name = document.getElementById('proName').value.trim();
        const price = document.getElementById('proPrice').value;
        const qty = document.getElementById('proQty').value;

        // فحص التكرار لمنع تسجيل منتج بنفس الاسم
        const duplicate = products.find(p => p.name.toLowerCase() === name.toLowerCase() && p.id != id);
        if (duplicate) {
            alert('تنبيه: هذا المنتج موجود بالفعل في الجدول!');
            return;
        }

        if(id) {
            // تعديل
            products = products.map(p => p.id == id ? {id, name, price, qty} : p);
        } else {
            // إضافة جديد
            products.push({ id: Date.now(), name, price, qty });
        }

        saveToStorage();
        resetForm();
    });

    function editProduct(id) {
        const prod = products.find(p => p.id == id);
        if(prod) {
            document.getElementById('productId').value = prod.id;
            document.getElementById('proName').value = prod.name;
            document.getElementById('proPrice').value = prod.price;
            document.getElementById('proQty').value = prod.qty;
            
            document.getElementById('formTitle').innerText = "تعديل المنتج";
            document.getElementById('saveBtn').className = "btn btn-warning px-4";
            document.getElementById('cancelBtn').classList.remove('d-none');
        }
    }

    function deleteProduct(id) {
        if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
            products = products.filter(p => p.id != id);
            saveToStorage();
        }
    }

    function resetForm() {
        form.reset();
        document.getElementById('productId').value = '';
        document.getElementById('formTitle').innerText = "إضافة منتج جديد";
        document.getElementById('saveBtn').className = "btn btn-success px-4";
        document.getElementById('cancelBtn').classList.add('d-none');
    }

    // التشغيل الأولي للجدول
    renderProducts();
</script>
</body>
</html>
